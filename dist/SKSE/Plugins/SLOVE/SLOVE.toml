# SLO VE — all settings. Read via TomlUtil (hosted by AudioUtil.dll).
# Live reload in-game:  cgf "SLOVE_Config.Reload"
# Voice SLOT mapping (which voice an actor gets) lives in the separate
# AudioUtil preset: SKSE\Plugins\AudioUtil\AudioUtil.toml.

[director]
enablevoice = 1                # master switch: scene voices
enableexpressions = 1          # master switch: facial expressions
enablepcexpression = 1
enablemalenpcexpression = 1
enablefemalenpcexpression = 1
usephysicslabels = 1           # velocity-driven intense/soft (needs SLPP interactions)
physicsfastvelocity = 25.0     # abs velocity at/above which a stage reads as Fast
physicsslowfactor = 0.65       # hysteresis: drop back to Slow below fast*factor
soshugeppsize = 6              # SOS size / TNG size counted as "huge"
printdebug = 0

[voice]
# chances are percent (0-100)
enablehugeppscenario = 1
enablevictimscenario = 1
chancetocommentunamused = 15
chancetocommentonleadinstage = 8
chancetocommentonnonintensestage = 22
chancetocommentonintensestage = 25
chancetocommentononattackingstage = 22
chancetocommentonblowjobstage = 15
chancetocommentwhenclosetoorgasm = 45
chancetocommentwhenmaleclosetoorgasm = 40
femaleorgasmhypeenjoyment = 75 # enjoyment threshold for orgasm hype lines
maleorgasmhypeenjoyment = 75
enablemalevoice = 1
chanceformaletocomment = 20
voiceallactors = 1             # every male speaks (rotation); 0 = lead male only
creaturebreathing = 1          # creature partners (C-slots) pant/growl during the scene
creaturebreathmininterval = 5  # seconds between creature breaths (halved on intense stages)
creaturebreathmaxinterval = 12
moanonly = 0                   # 1 = moans only, no spoken lines
hypebeforeorgasm = 0
useblowjobsoundforkissing = 1
pcvolume = 100                 # 0-100
partnervolume = 100
voicevariation = "NA"          # "B" selects the VarB line variants
enableddgagvoice = 1           # gagged voice when Devious Devices gag worn
printdebug = 0

[expressions]
enablebreathing = 1
breathingupdateinseconds = 0.55
pcnonintenseexpressionupdateinseconds = 2.1
pcintenseexpressionupdateinseconds = 1.6
npcnonintenseexpressionupdateinseconds = 2.1
npcintenseexpressionupdateinseconds = 1.6
enabletongue = 1
fhutonguetype = 7              # sr_fillherup tongue model 1-10; 0 = random
removetongueonblowjob = 1
cunusetongue = 1
enableahegao = 1               # huge partners trigger ahegao while penetrating
chancetostickouttongueduringintense = 30
chancetostickouttongueduringattacking = 30
tonguemouthopenthreshold = 0.4 # jaw gate: min measured mouth-open for tongue
printdebug = 0

[sfx]
# Body-SFX engine (SLOVE_SFX): slushing / impact / clap / kissing / blowjob
# sounds, played through AudioUtil (the sound names map to folders in the
# AudioUtil preset's [sfx] table; audio ships under Sound\fx\SloveSFX).
# Defaults track this load order's patched HentairimSFX/Config.json, not base
# Hentairim: the adaptive-velocity keys (useadaptivevelocity, timestosearch)
# are patch additions and are not in the shipped Hentairim SFX config.
enable = 1                     # master switch (applies the SFX effect to scene actors)
volume = 60                    # 0-100, startup value for the "sfx" audio group
usevelocity = 1                # thrust-synced sounds from SLPP collision velocity
# SOSBend calibration search: spams Debug.SendAnimationEvent(SOSBend) with 0.3s
# waits to hunt for a bend that yields velocity data. Heaviest path in the
# engine and off by default - only turn on if a scene otherwise reports no
# velocity (needs both keys: useadaptivevelocity=1 AND timestosearch>0).
useadaptivevelocity = 0        # SOSBend calibration search when no velocity data
timestosearch = 0              # adaptive: max calibration attempts per stage (0 = never search)
usecontactsfx = 1              # one-shots on contact edges (insertion, pull-out gape, kiss, oral)
usecontactvictimreactions = 1  # suppress tender kiss cues when a victim is involved
# poll intervals (seconds). velocitypoll must stay tight to catch thrust
# reversals; normalpoll paces the label/tag-driven loop (raise it to cut
# script load further - the sound's own clip length already paces playback).
velocitypoll = 0.1
normalpoll = 0.5
# measured-gape thresholds (PPA bridge): openings are unitless magic numbers,
# 0.0 = closed; calibrate against the pull-out printdebug line in your scenes
gapevaginalaverage = 2.0
gapevaginalhuge = 2.7
gapeanalaverage = 2.8
gapeanalhuge = 4.0
printdebug = 0

[milk]
# Oninus Lactis NG nipple squirts during scenes (player only), driven by the
# Director. Needs Oninus Lactis NG installed; stays off without it. If Milk
# Mod Economy is also installed, squirts require milk in the reserve and
# drain it proportionally (20-50% of current, scaled by level and duration).
enable = 0                     # master switch (and the mod must be present)
chanceonorgasm = 50            # percent roll on any orgasm in the scene (intense squirt)
chanceintense = 20             # percent per roll while penetrated, intense stage
chancenonintense = 8           # percent per roll while penetrated, soft stage
rollinterval = 10              # seconds between penetration rolls
mintime = 4                    # squirt duration bounds, seconds (engine caps at 18)
maxtime = 10
levelintense = 2               # OninusLactis squirt level 0-2
levelnonintense = 1
requirebarechest = 1           # skip while body slot (32) is covered
mmeminfullness = 20            # MME only: skip at/below this % fullness
