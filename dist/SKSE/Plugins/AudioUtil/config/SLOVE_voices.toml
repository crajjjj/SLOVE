# ---------- voice slots ----------
# Female voices work OUT OF THE BOX and with Hentairim/IVDT packs:
#   F0  = the stock DEFAULT female voice: SexLab's own moan set (loose files
#         every SexLab P+ install already has - nothing bundled, plain PCM so
#         lipsync works), mapped per category by intensity. All females speak
#         this until a pack or a pin says otherwise. (F0B = second stock
#         voice, used as the backfill for the partner/follower slots.)
#   F1  = the PLAYER pack slot (reserved in the base AudioUtil.toml): scans
#         Sound\fx\IVDT\F1 - drop ANY Hentairim-convention female pack there
#         and it just plays, no config edits. Categories the pack lacks (or the
#         whole slot, when no pack is installed) backfill per-category from F0
#         via `fallback`.
#   F2, F3 = partner/follower pack slots: same mechanics (scan IVDT\F2/F3,
#         backfill from F0B). Nothing routes to them by default - pin your
#         partner or follower via [npc_overrides] (base AudioUtil.toml), or map
#         a female voicetype to them in [voicetype_map].
# Categories a stock slot doesn't list resolve via [category_aliases.female]
# / [category_fallbacks.female] (both in the base AudioUtil.toml). Audit any
# slot in-game: cgf "SLOVE_Test.AuditVoicePack" "F1".
# M1-M8 are the bundled male packs (Hentairim voice pack assets, shipped
# with SLO VE under Sound\fx\IVDT):
# M1 Even Toned, M2 Argonian, M3 Brute, M4 Nord, M5 Condescending,
# M6 Dark Elf, M7 Khajiit, M8 Orc. Creature slots C1-C10 are defined at the
# bottom of the file (explicit BSA file lists, no folders).

[[slot]]  # player pack slot - any female pack dropped here wins per category
id = "F1"
sex = "female"
path = 'Sound\fx\IVDT\F1'
fallback = "F0"
gag_slot = "F1gag"    # muffled DD-gag voice when the actor wears a gag (see [gag])

[[slot]]  # partner/follower pack slot (route via [npc_overrides] / [voicetype_map])
id = "F2"
sex = "female"
path = 'Sound\fx\IVDT\F2'
fallback = "F0B"
gag_slot = "F1gag"    # shares the one bundled female gag pool

[[slot]]  # second partner/follower pack slot
id = "F3"
sex = "female"
path = 'Sound\fx\IVDT\F3'
