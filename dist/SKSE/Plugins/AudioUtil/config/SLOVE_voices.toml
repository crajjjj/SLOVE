# AudioUtil overlay — SLO VE voices: slots, routing + SFX (additive content).
#
# This is an ADDITIVE overlay. AudioUtil loads the base AudioUtil.toml first
# (SLO VE ships one holding just the globals), then merges every config\*.toml
# on top in sorted filename order. Overlays may only contribute ADDITIVE data —
# [[slot]], [sfx], and the resolution/category maps; the global scalar sections
# ([general]/[ppa]/[lipsync]/[gag] toggles) are read ONLY from the base and are
# ignored here. So this file holds all the voice CONTENT: the packs, the
# actor->slot routing, the category maps, and the body-SFX table.
#
# Slots are keyed by id — if another mod's overlay defines the same id,
# whichever file sorts LAST wins the whole slot (no per-category merge).
#
# Slots are defined by any mix of:
#   - a scanned folder tree (path = 'Sound\fx\IVDT\<Id>' holding
#     <Category>\*.wav subfolders),
#   - explicit per-category FILE lists ([slot.categories] array values) which
#     need no loose files and may point into BSA archives — see the creature
#     slots at the BOTTOM of this file,
#   - per-category FOLDER references ([slot.categories] string values,
#     'Sound\...' = full Data path, else relative to the slot's path; loose
#     files only) — see the F0/F0B SexLab-moan defaults below.
# Explicit categories win over same-named scanned folders. Every slot names its
# own full `path`, and every [sfx] entry a full 'Sound\...' path, so this preset
# never depends on a shared voice_root / sfx_root global.

# ===========================================================================
# ACTOR -> SLOT ROUTING & CATEGORY MAPS
# How an actor picks a slot, and how a script category resolves to a folder.
# All additive (these merge from every overlay); the slots they reference are
# defined below. Assigning a follower her own voice is a one-file edit here:
# pin her in [npc_overrides], or map a voicetype in [voicetype_map].
# ===========================================================================

# per-NPC slot pin: 'Plugin.esp|FormID' = "SlotId" (ESL: last 3 hex digits).
# Beats voicetype/race; pin a follower to F2/F3 to give her her own voice.
[npc_overrides]
# 'MyFollower.esp|000D62' = "F2"

# VoiceType synonyms: rename a voicetype we have no pack for to one we do (single
# hop; the target must be a [voicetype_map] key). enable = false turns it off.
[voicetype_remap]
enable = true
MaleCommander = "MaleBrute"
MaleSoldier = "MaleBrute"
MaleCommoner = "MaleEvenToned"
MaleCommonerAccented = "MaleEvenToned"
MaleEvenTonedAccented = "MaleEvenToned"
MaleYoungEager = "MaleEvenToned"
MaleDrunk = "MaleEvenToned"
MaleElfHaughty = "MaleCondescending"
MaleGuard = "MaleNord"
MaleNordCommander = "MaleNord"
MaleWarlock = "MaleCondescending"
MaleOldGrumpy = "MaleBrute"
MaleOldKindly = "MaleEvenToned"
MaleSlyCynical = "MaleCondescending"
MaleDarkElfCynical = "MaleDarkElf"
MaleKhajiitAccented = "MaleKhajitt"

# VoiceType -> slot. A value may list several slots; actors sharing the
# voicetype spread across them deterministically (same NPC = same slot).
[voicetype_map]
MaleEvenToned = "M1"
MaleArgonian = "M2"
MaleBrute = "M3"
MaleNord = "M4"
MaleBandit = ["M3", "M4"]
MaleCondescending = "M5"
MaleDarkElf = "M6"
MaleKhajitt = "M7"
MaleOrc = "M8"

# race -> slot fallback (when no voicetype maps). Substring-matched against the
# race editor id, longest hint wins. Creature slots C1-C10 (defined below)
# are sex = "all" so they match whatever sex the engine reports.
[race_map]
Argonian = "M2"
Nord = "M4"
DarkElf = "M6"
HighElf = "M5"
Khajiit = "M7"
Orc = "M8"
# creatures (slots C1-C10, defined at the bottom of this file)
Werewolf = "C1"
Draugr = "C2"            # skeletons are NOT covered - add a Skeleton hint if wanted
Falmer = "C3"
Troll = "C4"
Giant = "C5"
Wolf = "C6"
Dog = "C7"
Husky = "C7"             # DLC1HuskyRace / armored huskies don't contain "Dog"
Chaurus = "C8"           # includes Reaper and Hunter variants
Spriggan = "C9"          # includes Matron
Horse = "C10"

