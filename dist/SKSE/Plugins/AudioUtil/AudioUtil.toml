# startup group volumes (0.0-1.0). STARTUP only - MCM sliders override at runtime
# via SetGroupVolume. pc_* = player voice, partner_* = NPC voice, sfx = body
# sounds, oneshot = out-of-scene one-shots.
[groups]
pc_high = 1.0
pc_low = 1.0
partner_high = 1.0
partner_low = 1.0
sfx = 1.0
oneshot = 1.0
