# AudioUtil BASE config — SLO VE preset (globals only).
#
# SLO VE ships this file to overwrite AudioUtil's neutral default via load order.
# Engine-wide globals — [general]/[ppa]/[lipsync] and the [gag] enable/
# default_category toggles — are read ONLY from this base, never from a
# config\*.toml overlay (an overlay that sets them is ignored + warned). All the
# voice CONTENT — the slots, the actor->slot routing maps, the category maps and
# SFX — lives in the additive overlay
#   SKSE\Plugins\AudioUtil\config\SLOVE_voices.toml
# and any mod may drop its own config\*.toml to ADD slots / sfx / mappings (they
# accumulate). Re-read both in-game with  cgf "AudioUtil.ReloadConfig".
# All key/name matching is case- and space-insensitive.
#
# How an actor resolves to a slot, how a category resolves to audio, and every
# key below are documented in full at: https://crajjjj.github.io/AudioUtil/

[general]
log_level = "info"            # trace | debug | info | warn | error
sound_flags = 0x1A            # BuildSoundDataFromFile flags (experiment via DebugPlayFile)
sound_priority = 128
# false = voices play flat/2D at full volume so every speaker is equally audible;
# true = 3D at the speaker (partners/creatures attenuate with distance). Lipsync
# unaffected either way; SFX always play 3D at the actor.
voice_3d = true
# skip a new voice line while the speaker's channel is still playing one, so a
# line finishes first (per speaker; different speakers still overlap).
voice_no_interrupt = true
default_female_slot = "F0"    # unrouted female NPCs speak the stock moans
default_male_slot = "M1"
# reserved player slots: the PC always speaks this slot and no NPC ever resolves
# to it. Set pc_male_slot = "M1" too when playing a male PC.
pc_female_slot = "F1"
pc_male_slot = ""

[ppa]
enable = true                 # Accurate Penetration bridge: drives thrust-synced SFX + contact one-shots
event_rate_ms = 2000          # min interval per receiver for AudioUtilPPA_Update events (floored at 1000)

[lipsync]
# Mouths move with the moans: every PlayVoice line drives the speaker's MFG
# Aah/BigAah phonemes from the wav's loudness envelope, per frame. Loose PCM
# wavs only; BSA-packed creature slots play fine without mouth movement.
enable = true
gain = 1.0                    # 0.0-2.0 mouth-open strength
attack_ms = 30                # opening speed toward a louder level
release_ms = 90               # closing speed on quiet / clip end
min_level = 0.04              # levels below this keep the mouth closed
# categories that never drive the mouth: blowjob action is oral SFX (slurping,
# not vocalization); Orgasm hands the mouth to the climax/ahegao face.
block_categories = ["BlowjobActionSoft", "BlowjobActionIntense", "Orgasm"]

[gag]
# When a speaking female wears a keyword below, her voice routes through her
# slot's gag_slot (F1/F2/F3 -> F1gag in SLOVE_voices.toml) for a muffled clip and
# lipsync is suppressed (the device owns the mouth). F1gag holds only "GagMoan",
# so every gagged line falls through to default_category - muffled, never
# silence, never a clear line. Keywords are 'Plugin.esp|FormID'; one whose mod
# isn't installed is silently skipped, so listing them all is harmless.
enable = true
default_category = "GagMoan"
keywords = [
  'Devious Devices - Assets.esm|7EB8',   # zad_DeviousGag
  'ZaZAnimationPack.esm|8A4D',           # zbfWornGag
  'ZaZAnimationPack.esm|8A35',           # zbfEffectOpenMouth
  'Toys.esm|8C2',                        # ToysEffectMouthOpen
  'SL Survival.esp|0B74B5',              # _SLS_TongueKeyword (tongue/deepthroat)
]
