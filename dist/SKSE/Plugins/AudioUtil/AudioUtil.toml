# AudioUtil BASE config — SLO VE preset (globals + routing).
#
# SLO VE ships this base AudioUtil.toml, overwriting AudioUtil's neutral default
# via load order. The base file is the ONE place engine-wide globals live:
# AudioUtil reads [general]/[ppa]/[lipsync]/[gag] toggles ONLY from here, never
# from a config\*.toml overlay (an overlay that sets them is ignored + warned).
# That way an add-on voice pack can't silently change your sound flags, lipsync,
# or PPA settings.
#
# The bulky voice-slot content lives in the additive overlay
#   SKSE\Plugins\AudioUtil\config\SLOVE_slots.toml
# and any other mod may drop its own config\*.toml to ADD slots / sfx / mappings
# (those accumulate). Load order: this base first, then every config\*.toml in
# sorted filename order. Re-read both in-game with cgf "AudioUtil.ReloadConfig".
#
# ---------------------------------------------------------------------------
# QUICK GUIDE — the tweaks people actually come here for (all in THIS file):
#   change which voice a voicetype gets .... [voicetype_map]
#   cover an unlisted voicetype ............ [voicetype_remap]
#   pin one specific NPC to a slot ......... [npc_overrides]
#   voice by race / creatures .............. [race_map]
#   startup volumes ........................ [groups]  (MCM sliders override!)
#   muffled voice + still mouth when gagged  [gag]  (+ a slot's gag_slot)
#   add / edit a voice pack ................ [[slot]] in config\SLOVE_slots.toml
#
# HOW AN ACTOR FINDS THEIR VOICE (checked top to bottom, first hit wins):
#   1. pc_female_slot / pc_male_slot   (player only; reserved from NPCs)
#   2. [npc_overrides]                 (explicit per-NPC pin)
#   3. [voicetype_remap]               (rename voicetype, then:)
#   4. [voicetype_map]                 (voicetype -> slot)
#   5. [race_map]                      (race substring -> slot)
#   6. default_female_slot / default_male_slot
#
# HOW A CATEGORY FINDS ITS AUDIO (within the resolved slot):
#   exact folder -> [category_aliases] -> [male_only_remap] (male slots only)
#   -> [category_fallbacks] (one hop) -> the slot's fallback slot (same steps;
#   how empty F1/F2 backfill from the F0* moan slots) -> [sfx] table last resort
#
# All name/key matching is case- and space-insensitive
# ("About To Cum" == "AboutToCum" == "abouttocum").
# ---------------------------------------------------------------------------

[general]
log_level = "info"            # trace | debug | info | warn | error
sound_flags = 0x1A            # BuildSoundDataFromFile flags (experiment via DebugPlayFile)
sound_priority = 128
# false = voices play flat/2D at full volume, so every speaker is equally
# audible. With 3D on, the player's voice sits at the listener while partners
# and creatures attenuate with distance and can sound faint even though their
# source is louder. Lipsync is unaffected either way. SFX always play
# 3D-positioned at the actor. Live-toggle: edit + cgf "AudioUtil.ReloadConfig".
voice_3d = true
# skip a new voice line when the speaker's channel is still playing one, so a
# line finishes before the next starts (per speaker - different speakers still
# overlap). Stops the PC cutting herself off mid-line.
voice_no_interrupt = true
default_female_slot = "F0"    # unrouted female NPCs speak the stock moans
default_male_slot = "M1"
# reserved player slots: the PC always speaks with this slot and no other actor
# ever resolves to it. Set pc_male_slot = "M1" too when playing a male PC.
pc_female_slot = "F1"
pc_male_slot = ""

[ppa]
enable = true                 # velocity/collision bridge (Accurate Penetration):
                              # drives thrust-synced SFX and contact one-shots
event_rate_ms = 2000          # min interval per receiver for AudioUtilPPA_Update mod events
# GetPPAContext / AudioUtilPPA_Update context bitmask:
#   1=Vaginal  2=Anal  4=Oral  8=Aggressive  16=FemDom  32=Loving
#   64=Dirty  128=Boobjob  256=Handjob  512=Footjob  1024=Masturbation

[lipsync]
# Mouths move with the moans: every PlayVoice line drives the speaker's MFG
# Aah/BigAah phonemes from the wav's loudness envelope, per frame, natively.
# Loose PCM wavs only (all IVDT voice packs qualify); BSA-packed creature
# slots play fine without mouth movement. Runtime: SetLipSyncEnabled/Gain.
enable = true
gain = 1.0                    # 0.0-2.0 mouth-open strength
attack_ms = 30                # opening speed toward a louder level
release_ms = 90               # closing speed on quiet / clip end
min_level = 0.04              # levels below this keep the mouth closed
# categories that never drive the mouth (matched on the requested name). Blowjob
# action is oral SFX (slurping, not vocalization); Orgasm hands the mouth to the
# climax/ahegao face. Applies across all slots that serve these categories.
block_categories = ["BlowjobActionSoft", "BlowjobActionIntense", "Orgasm"]

[gag]
# Gag / deepthroat / mouth-owning devices. When a speaking female wears any
# keyword below, two things happen automatically:
#   1. her voice routes through her slot's `gag_slot` (see F1/F2/F3 -> F1gag
#      in config\SLOVE_slots.toml) so a muffled clip plays instead of the clear
#      line, and
#   2. lipsync is suppressed - the device owns the mouth, so the DLL won't
#      fight it (this replaces the old MFG mouth-open guesswork).
# F1gag holds one muffled pool ("GagMoan"); no SLO VE scene category exists
# there, so every gagged line falls through to default_category - a muffled
# clip, never silence, never a clear line.
# Keywords are 'Plugin.esp|FormID' (hex), same form as [npc_overrides] keys.
# A keyword whose mod you don't run is silently skipped, so leaving all of
# these listed is harmless. enable = false turns the whole feature off.
# (enable / default_category are globals -> base-only; the keywords list is
# additive, so an add-on may contribute more gag markers from its overlay.)
enable = true
default_category = "GagMoan"
keywords = [
  'Devious Devices - Assets.esm|7EB8',   # zad_DeviousGag
  'ZaZAnimationPack.esm|8A4D',           # zbfWornGag
  'ZaZAnimationPack.esm|8A35',           # zbfEffectOpenMouth
  'Toys.esm|8C2',                        # ToysEffectMouthOpen
  'SL Survival.esp|0B74B5',              # _SLS_TongueKeyword (tongue/deepthroat)
]

# ---------- 2. per-NPC slot pin ----------
# Beats voicetype and race resolution; may target any slot, even a reserved
# one. Key is 'Plugin.esp|FormID'; for ESL-flagged plugins use the last
# 3 hex digits ('MyEslMod.esp|D62'). This is how you give your partner or
# follower her own voice: pin her to F2/F3 and (optionally) install a pack
# into Sound\fx\IVDT\F2 - without a pack she speaks the F0B stock moans.

[npc_overrides]
# 'MyFollower.esp|000D62' = "F2"

# ---------- 3. VoiceType synonyms (was EnableReassigningMaleVoice) ----------
# Renames voicetypes we have no pack for to one we do - each line reads as
# the claim being made ("a guard sounds like a Nord"). Single hop: the target
# must be a [voicetype_map] key. enable = false turns this layer off, so only
# exact [voicetype_map] matches get voices.

[voicetype_remap]
enable = true
MaleCommander = "MaleBrute"
MaleSoldier = "MaleBrute"
MaleCommoner = "MaleEvenToned"
MaleCommonerAccented = "MaleEvenToned"
MaleEvenTonedAccented = "MaleEvenToned"
MaleYoungEager = "MaleEvenToned"
MaleDrunk = "MaleEvenToned"
MaleElfHaughty = "MaleCondescending"
MaleGuard = "MaleNord"
MaleNordCommander = "MaleNord"
MaleWarlock = "MaleCondescending"
MaleOldGrumpy = "MaleBrute"
MaleOldKindly = "MaleEvenToned"
MaleSlyCynical = "MaleCondescending"
MaleDarkElfCynical = "MaleDarkElf"
MaleKhajiitAccented = "MaleKhajitt"

# ---------- 4. VoiceType -> slot (was GetVoiceForActor's if-ladder) ----------
# A value may list several candidate slots - actors sharing the voicetype are
# spread across them deterministically (same NPC = same slot, always).

[voicetype_map]
MaleEvenToned = "M1"
MaleArgonian = "M2"
MaleBrute = "M3"
MaleNord = "M4"
MaleBandit = ["M3", "M4"]
MaleCondescending = "M5"
MaleDarkElf = "M6"
MaleKhajitt = "M7"
MaleOrc = "M8"

# ---------- 5. race -> slot fallback (when no voicetype maps) ----------
# For custom-voiced NPCs and creatures. Hints are substring-matched against
# the race editor id ("Nord" matches NordRace and NordRaceVampire; "Troll"
# matches TrollRace and TrollFrostRace); the most specific (longest) hint
# wins, which is what keeps Werewolf and Wolf apart. Values may be slot
# lists, same as [voicetype_map]. The C1-C10 creature slots (in
# config\SLOVE_slots.toml) are sex = "all", so they match a creature whatever
# sex the engine reports for it.

[race_map]
Argonian = "M2"
Nord = "M4"
DarkElf = "M6"
HighElf = "M5"
Khajiit = "M7"
Orc = "M8"
# creatures (slots C1-C10, defined in config\SLOVE_slots.toml)
Werewolf = "C1"
Draugr = "C2"            # skeletons are NOT covered - add a Skeleton hint if wanted
Falmer = "C3"
Troll = "C4"
Giant = "C5"
Wolf = "C6"
Dog = "C7"
Husky = "C7"             # DLC1HuskyRace / armored huskies don't contain "Dog"
Chaurus = "C8"           # includes Reaper and Hunter variants
Spriggan = "C9"          # includes Matron
Horse = "C10"

