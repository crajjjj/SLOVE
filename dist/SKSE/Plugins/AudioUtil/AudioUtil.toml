# APPENDIX: creature slot data (referenced by [race_map] above)
# ===========================================================================
# Explicit file lists playing straight out of the vanilla archives
# (Skyrim - Sounds.bsa; dlc01 paths are the Dawnguard files merged into it).
# Explicit [slot.categories] need no folders on disk: the engine's resource
# loader resolves BSA-packed paths that folder scans cannot see.
# Two categories per slot: Orgasm fires at climax, Breathing is rolled
# periodically by SLOVE_Voice during the scene (see SLOVE.toml [voice]
# creaturebreathing*). Slots without usable ambience material simply omit
# Breathing - the play resolves nothing and stays silent.
# Every path below is verified against the SE archive listing; vanilla ships
# no Sound\FX material at all for some creatures (Falmer and Spriggan combat
# barks live in the voice archives, not fx), which is why some lists are thin.

