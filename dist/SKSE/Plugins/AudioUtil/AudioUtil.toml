# ---------- startup group volumes (0.0 - 1.0) ----------
# pc_* = player voice, partner_* = NPC voice, high/low = line priority tier,
# sfx = body sounds, oneshot = out-of-scene one-shots (IVDTVoiceCall).
# These are STARTUP values only - the MCM volume sliders override them at
# runtime via SetGroupVolume; edit here for the pre-MCM default.

[groups]
pc_high = 1.0
pc_low = 1.0
partner_high = 1.0
partner_low = 1.0
sfx = 1.0
oneshot = 1.0
